services:
  asyncup:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - path: .env
        required: false
    environment:
      DB_PATH: /data/standup.db
    volumes:
      - standup-data:/data
      # Mount your GCP service account key and set
      # GOOGLE_APPLICATION_CREDENTIALS=/app/service-account.json in .env:
      # - ./service-account.json:/app/service-account.json:ro

volumes:
  standup-data:
